name: Import vessel candidates

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-vessel-candidates
  cancel-in-progress: false

jobs:
  import-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-candidates.txt

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements-candidates.txt

      - name: Wikipedia-Kandidaten importieren
        run: >
          python
          tools/import_wikipedia_river_cruise_candidates.py

      - name: Änderungen committen
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data/imports data/vessel_candidates.csv)" ]; then
            echo "Keine Änderungen am Kandidatenkatalog."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/imports data/vessel_candidates.csv
          git commit -m "Import river cruise vessel candidates"
          git push
